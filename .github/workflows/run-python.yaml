name: Run Python Script
on: [push]
jobs:
  runs-python-script:
    runs-on: ubuntu-latest
    steps:
      - name: Inicio
        run: echo "Comienza Action"
      - name: Clona Repo
        uses: actions/checkout@v6
      - name: Muestra archivos
        run: ls -la
      - name: Definir variable
        run: echo "USERNAME=${{ github.actor }}">> $GITHUB_ENV
      - name: Ejecuta Script
        run: python app.py